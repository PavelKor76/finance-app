<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Finance</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg:      #0F0F14;
            --bg2:     #17171F;
            --bg3:     #1E1E28;
            --border:  #2A2A38;
            --text:    #F0F0F8;
            --text2:   #8888AA;
            --income:  #22C55E;
            --expense: #EF4444;
            --xfer:    #6366F1;
            --accent:  #7C6FF7;
            --r:       16px;
            --nav:     70px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'Manrope', sans-serif;
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            overflow: hidden;
        }

        /* ── Screens ── */
        .screen {
            display: none;
            height: 100vh;
            overflow-y: auto;
            padding: 16px 16px calc(var(--nav) + 20px);
        }
        .screen.active { display: block; }

        /* ── Bottom nav ── */
        .bottom-nav {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            height: var(--nav);
            background: var(--bg2);
            border-top: 1px solid var(--border);
            display: flex;
            align-items: center;
            padding: 0 8px;
            padding-bottom: env(safe-area-inset-bottom);
            z-index: 100;
        }
        .nav-btn {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 3px;
            background: none;
            border: none;
            color: var(--text2);
            cursor: pointer;
            padding: 8px 0;
            transition: color .2s;
        }
        .nav-btn.active { color: var(--accent); }
        .nav-icon { font-size: 22px; }
        .nav-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .5px; }

        /* ── Cards ── */
        .card {
            background: var(--bg2);
            border: 1px solid var(--border);
            border-radius: var(--r);
            padding: 16px;
            margin-bottom: 12px;
        }

        /* ── Section title ── */
        .sec { font-size: 12px; font-weight: 700; color: var(--text2); text-transform: uppercase; letter-spacing: .6px; margin-bottom: 8px; }

        /* ── HOME ── */
        .balance-card {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 55%, #0f3460 100%);
            border-radius: var(--r);
            padding: 24px;
            margin-bottom: 12px;
            text-align: center;
        }
        .bal-label { color: var(--text2); font-size: 12px; font-weight: 600; margin-bottom: 6px; }
        .bal-amount { font-size: 38px; font-weight: 800; letter-spacing: -1px; }
        .bal-period { color: var(--text2); font-size: 12px; margin-top: 6px; }

        .stats-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px; }
        .stat-card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--r); padding: 14px; }
        .stat-label { color: var(--text2); font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .5px; }
        .stat-val { font-size: 20px; font-weight: 800; margin-top: 4px; }
        .stat-val.inc { color: var(--income); }
        .stat-val.exp { color: var(--expense); }

        /* ── Transaction item ── */
        .tx { display: flex; align-items: center; gap: 12px; padding: 11px 0; border-bottom: 1px solid var(--border); }
        .tx:last-child { border-bottom: none; }
        .tx-ico {
            width: 40px; height: 40px; border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            font-size: 20px; flex-shrink: 0;
        }
        .tx-ico.income   { background: rgba(34,197,94,.15); }
        .tx-ico.expense  { background: rgba(239,68,68,.15); }
        .tx-ico.transfer { background: rgba(99,102,241,.15); }
        .tx-info { flex: 1; min-width: 0; }
        .tx-cat  { font-size: 14px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .tx-date { font-size: 12px; color: var(--text2); margin-top: 2px; }
        .tx-sum  { font-size: 15px; font-weight: 700; flex-shrink: 0; }
        .tx-sum.income   { color: var(--income); }
        .tx-sum.expense  { color: var(--expense); }
        .tx-sum.transfer { color: var(--xfer); }

        /* ── ADD ── */
        .type-toggle { display: flex; background: var(--bg3); border-radius: 12px; padding: 4px; margin-bottom: 20px; }
        .type-btn {
            flex: 1; padding: 10px; border: none;
            background: transparent; color: var(--text2);
            font-family: 'Manrope', sans-serif; font-size: 13px; font-weight: 700;
            border-radius: 8px; cursor: pointer; transition: all .2s;
        }
        .type-btn.active { background: var(--bg2); color: var(--text); }
        .type-btn.active[data-type="income"]   { color: var(--income); }
        .type-btn.active[data-type="expense"]  { color: var(--expense); }
        .type-btn.active[data-type="transfer"] { color: var(--xfer); }

        .amount-wrap { text-align: center; margin-bottom: 20px; }
        .amount-lbl { font-size: 11px; font-weight: 700; color: var(--text2); letter-spacing: .6px; margin-bottom: 6px; text-transform: uppercase; }
        .amount-inp {
            font-family: 'Manrope', sans-serif; font-size: 52px; font-weight: 800;
            background: transparent; border: none; color: var(--text);
            text-align: center; width: 100%; outline: none;
        }
        .amount-inp::placeholder { color: var(--text2); }

        .cats-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 8px; margin-bottom: 16px; }
        .cat-btn {
            background: var(--bg3); border: 2px solid transparent;
            border-radius: 12px; padding: 10px 6px;
            cursor: pointer; text-align: center; transition: all .15s;
        }
        .cat-btn.sel { border-color: var(--accent); background: rgba(124,111,247,.1); }
        .cat-ico  { font-size: 22px; display: block; }
        .cat-name { font-size: 10px; color: var(--text2); margin-top: 4px; font-weight: 600; display: block; line-height: 1.3; }
        .cat-btn.sel .cat-name { color: var(--accent); }

        .f-field  { margin-bottom: 14px; }
        .f-label  { font-size: 11px; color: var(--text2); font-weight: 700; text-transform: uppercase; letter-spacing: .5px; margin-bottom: 6px; display: block; }
        .f-input  {
            width: 100%; background: var(--bg3); border: 1px solid var(--border);
            border-radius: 10px; padding: 12px 14px; color: var(--text);
            font-family: 'Manrope', sans-serif; font-size: 15px; outline: none;
        }
        .f-input:focus { border-color: var(--accent); }

        .save-btn {
            width: 100%; padding: 16px; background: var(--accent);
            border: none; border-radius: 14px; color: white;
            font-family: 'Manrope', sans-serif; font-size: 16px; font-weight: 700;
            cursor: pointer; margin-top: 8px; transition: opacity .2s;
        }
        .save-btn:active   { opacity: .8; }
        .save-btn:disabled { opacity: .5; }

        /* ── REPORTS ── */
        .chips { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 4px; margin-bottom: 16px; scrollbar-width: none; }
        .chips::-webkit-scrollbar { display: none; }
        .chips.wrap { flex-wrap: wrap; overflow-x: visible; }
        .chip {
            padding: 8px 14px; background: var(--bg3); border: 1px solid var(--border);
            border-radius: 20px; color: var(--text2); font-size: 13px; font-weight: 700;
            white-space: nowrap; cursor: pointer; flex-shrink: 0; transition: all .15s;
        }
        .chip.active { background: var(--accent); border-color: var(--accent); color: white; }

        .chart-box { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--r); padding: 16px; margin-bottom: 12px; }

        .cat-row { display: flex; align-items: center; gap: 12px; padding: 10px 0; border-bottom: 1px solid var(--border); }
        .cat-row:last-child { border-bottom: none; }
        .cat-row-info { flex: 1; }
        .cat-row-name { font-size: 13px; font-weight: 600; margin-bottom: 4px; }
        .bar-bg { height: 4px; background: var(--bg3); border-radius: 2px; overflow: hidden; }
        .bar-fill { height: 100%; border-radius: 2px; transition: width .5s ease; }
        .cat-row-sum { font-size: 14px; font-weight: 700; flex-shrink: 0; }

        /* ── HISTORY ── */
        .filter-row { display: flex; gap: 8px; margin-bottom: 12px; }
        .f-select {
            flex: 1; background: var(--bg3); border: 1px solid var(--border);
            border-radius: 10px; padding: 10px 12px; color: var(--text);
            font-family: 'Manrope', sans-serif; font-size: 13px; font-weight: 600; outline: none;
        }

        /* ── Shared ── */
        .loading { text-align: center; color: var(--text2); padding: 36px; font-size: 14px; }
        .empty { text-align: center; color: var(--text2); padding: 36px 20px; }
        .empty-ico { font-size: 44px; margin-bottom: 10px; }
        .empty-txt { font-size: 14px; }

        .toast {
            position: fixed; top: 20px; left: 50%;
            transform: translateX(-50%) translateY(-100px);
            background: var(--bg3); border: 1px solid var(--border);
            border-radius: 12px; padding: 12px 20px;
            font-size: 14px; font-weight: 700; z-index: 999; white-space: nowrap;
            transition: transform .3s ease;
        }
        .toast.show   { transform: translateX(-50%) translateY(0); }
        .toast.ok     { border-color: var(--income); color: var(--income); }
        .toast.err    { border-color: var(--expense); color: var(--expense); }

        .screen-title { font-size: 22px; font-weight: 800; margin-bottom: 16px; }
    </style>
</head>

// ════════════════════════════════════════
// CONFIG
// ════════════════════════════════════════
const SUPABASE_URL = 'https://tkvzbmqdlbutlgglluvs.supabase.co';
const SUPABASE_KEY = 'sb_publishable_YJmzcAGoGiYbkHOrdYXqXg_WImJePQg';

// ════════════════════════════════════════
// CATEGORIES (хардкод = без лишнего запроса в БД)

const CATS = [

// ════════════════════════════════════════
// UTILS
// ════════════════════════════════════════
const fmt = n => new Intl.NumberFormat('ru-RU').format(Math.round(n)) + ' ₽';

const getCat = id => CATS.find(c => c.id === id) || { name:'Без категории', icon:'❓', type:'expense' };

const todayStr = () => new Date().toISOString().split('T')[0];

function fmtDate(s) {
    if (!s) return '';
    // Supabase возвращает timestamp '2026-05-04 11:32:16.526' или дату '2026-05-04'
    const clean = s.length > 10 ? s.replace(' ', 'T').split('.')[0] : s + 'T00:00:00';
    const d = new Date(clean);
    if (isNaN(d)) return s.slice(0, 10);
    return d.toLocaleDateString('ru-RU', { day:'numeric', month:'short' });
}

function getPeriod(period) {
    const now = new Date();
    const y = now.getFullYear(), m = now.getMonth();
    const pad = n => String(n).padStart(2,'0');
    const iso = d => d.toISOString().split('T')[0];

    if (period === 'today') {
        const t = todayStr();
        return { from: t, to: t };
    }
    if (period === 'week') {
        const day = now.getDay() || 7;
        const mon = new Date(now);
        mon.setDate(now.getDate() - day + 1);
        return { from: iso(mon), to: iso(now) };
    }
    if (period === 'month') {
        return {
            from: `${y}-${pad(m+1)}-01`,
            to: iso(new Date(y, m+1, 0))
        };
    }
    if (period === 'prev_month') {
        const pm = m === 0 ? 11 : m-1;
        const py = m === 0 ? y-1 : y;
        return {
            from: `${py}-${pad(pm+1)}-01`,
            to: iso(new Date(py, pm+1, 0))
        };
    }
    // all
    return { from: '2020-01-01', to: '2099-12-31' };
}

function toast(msg, type = 'ok') {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.className = 'toast ' + type;
    el.classList.add('show');
    setTimeout(() => el.classList.remove('show'), 2500);
}

// ════════════════════════════════════════
// SUPABASE — helpers
// ════════════════════════════════════════
// Почему отдельные dbGet / dbInsert?
// Чтобы вся логика работы с API была в одном месте.
// Любой экран просто вызывает dbGet('transactions', {...}) — не думает про fetch/headers.

async function dbGet(table, { select = '*', filters = [], order = null, limit = null } = {}) {
    let url = `${SUPABASE_URL}/rest/v1/${table}?select=${select}`;
    filters.forEach(f => url += '&' + f);
    if (order)  url += '&order=' + order;
    if (limit)  url += '&limit=' + limit;

    const res = await fetch(url, {
        headers: {
            'apikey': SUPABASE_KEY,
            'Authorization': 'Bearer ' + SUPABASE_KEY
        }
    });
    if (!res.ok) throw new Error(await res.text());
    return res.json();
}

async function dbInsert(table, data) {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/${table}`, {
        method: 'POST',
        headers: {
            'apikey': SUPABASE_KEY,
            'Authorization': 'Bearer ' + SUPABASE_KEY,
            'Content-Type': 'application/json',
            'Prefer': 'return=minimal'
        },
        body: JSON.stringify(data)
    });
    if (!res.ok) throw new Error(await res.text());
}

// ROUTER
// ════════════════════════════════════════
function navigate(name) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('screen-' + name).classList.add('active');
    document.querySelector(`.nav-btn[data-screen="${name}"]`).classList.add('active');

    // каждый экран загружает свои данные при переходе
    if (name === 'home')    loadHome();
    if (name === 'reports') loadReports();
    if (name === 'history') loadHistory();
}

document.querySelectorAll('.nav-btn').forEach(b => {
    b.addEventListener('click', () => navigate(b.dataset.screen));
});

// ════════════════════════════════════════
// HOME
// ════════════════════════════════════════
async function loadHome() {
    const now = new Date();
    const months = ['января','февраля','марта','апреля','мая','июня','июля','августа','сентября','октября','ноября','декабря'];
    document.getElementById('home-period').textContent = months[now.getMonth()] + ' ' + now.getFullYear();

    try {
        const { from, to } = getPeriod('month');
        const txs = await dbGet('transactions', {
            filters: [`date=gte.${from}`, `date=lte.${to}`],
            order: 'date.desc'
        });

        let inc = 0, exp = 0;
        txs.forEach(tx => {
            if (tx.type === 'income')  inc += Number(tx.amount);
            if (tx.type === 'expense') exp += Number(tx.amount);
        });

        document.getElementById('home-balance').textContent = fmt(inc - exp);
        document.getElementById('home-income').textContent  = fmt(inc);
        document.getElementById('home-expense').textContent = fmt(exp);

        const recent = txs.slice(0, 5);
        const el = document.getElementById('home-recent');
        if (!recent.length) {
            el.innerHTML = '<div class="empty"><div class="empty-ico">📭</div><div class="empty-txt">Операций пока нет</div></div>';
            return;
        }
        el.innerHTML = recent.map(tx => txHTML(tx)).join('');

    } catch(e) {
        console.error(e);
        document.getElementById('home-recent').innerHTML = '<div class="loading">Ошибка загрузки</div>';
    }
}

// ADD
// ════════════════════════════════════════
let addType  = 'income';
let addCatId = null;

function renderCatGrid() {
    const grid = document.getElementById('add-cats');
    addCatId = null;
    grid.innerHTML = CATS.filter(c => c.type === addType).map(c => `
        <button class="cat-btn" data-id="${c.id}">
            <span class="cat-ico">${c.icon}</span>
            <span class="cat-name">${c.name}</span>
        </button>
    `).join('');
    grid.querySelectorAll('.cat-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            grid.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('sel'));
            btn.classList.add('sel');
            addCatId = Number(btn.dataset.id);
        });
    });
}

document.querySelectorAll('.type-btn').forEach(btn => {
    btn.addEventListener('click', () => {
        document.querySelectorAll('.type-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        addType = btn.dataset.type;
        renderCatGrid();
    });
});

document.getElementById('add-date').value = todayStr();

document.getElementById('add-save').addEventListener('click', async () => {
    const amount = parseFloat(document.getElementById('add-amount').value);
    const date   = document.getElementById('add-date').value;
    const desc   = document.getElementById('add-desc').value.trim();

    if (!amount || amount <= 0) { toast('Введи сумму', 'err'); return; }
    if (!addCatId)              { toast('Выбери категорию', 'err'); return; }

    const btn = document.getElementById('add-save');
    btn.disabled = true;
    btn.textContent = 'Сохранение…';

    try {
        await dbInsert('transactions', {
            date,
            amount,
            type:        addType,
            category_id: addCatId,
            description: desc || null,
            source:      'miniapp'
        });
        toast('✅ Сохранено!');
        document.getElementById('add-amount').value = '';
        document.getElementById('add-desc').value   = '';
        document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('sel'));
        addCatId = null;
    } catch(e) {
        toast('Ошибка: ' + e.message, 'err');
        console.error(e);
    } finally {
        btn.disabled = false;
        btn.textContent = 'Сохранить';
    }
});

renderCatGrid();

// REPORTS
// ════════════════════════════════════════
let repPeriod = 'month';
let repChart  = null;

document.querySelectorAll('#report-chips .chip').forEach(chip => {
    chip.addEventListener('click', () => {
        document.querySelectorAll('#report-chips .chip').forEach(c => c.classList.remove('active'));
        chip.classList.add('active');
        repPeriod = chip.dataset.period;
        loadReports();
    });
});

async function loadReports() {
    const { from, to } = getPeriod(repPeriod);
    try {
        const txs = await dbGet('transactions', {
            filters: [`date=gte.${from}`, `date=lte.${to}`],
            order: 'date.asc'
        });

        // Totals
        let inc = 0, exp = 0;
        txs.forEach(tx => {
            if (tx.type === 'income')  inc += Number(tx.amount);
            if (tx.type === 'expense') exp += Number(tx.amount);
        });
        document.getElementById('rep-income').textContent  = fmt(inc);
        document.getElementById('rep-expense').textContent = fmt(exp);

        // Bar chart — группируем по дате
        const dayMap = {};
        txs.forEach(tx => {
            if (!dayMap[tx.date]) dayMap[tx.date] = { inc: 0, exp: 0 };
            if (tx.type === 'income')  dayMap[tx.date].inc += Number(tx.amount);
            if (tx.type === 'expense') dayMap[tx.date].exp += Number(tx.amount);
        });
        const days = Object.keys(dayMap).sort();

        if (repChart) repChart.destroy();
        const ctx = document.getElementById('rep-chart').getContext('2d');
        repChart = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: days.map(fmtDate),
                datasets: [
                    { label:'Доходы',  data: days.map(d => dayMap[d].inc), backgroundColor:'rgba(34,197,94,.7)',  borderRadius:4 },
                    { label:'Расходы', data: days.map(d => dayMap[d].exp), backgroundColor:'rgba(239,68,68,.7)',  borderRadius:4 }
                ]
            },
            options: {
                responsive: true,
                plugins: {
                    legend: { labels: { color:'#8888AA', font:{ size:11, family:'Manrope' } } },
                    tooltip: { callbacks: { label: c => ' ' + fmt(c.raw) } }
                },
                scales: {
                    x: { ticks:{ color:'#8888AA', font:{ size:10 } }, grid:{ color:'rgba(255,255,255,.05)' } },
                    y: { ticks:{ color:'#8888AA', font:{ size:10 }, callback: v => fmt(v) }, grid:{ color:'rgba(255,255,255,.05)' } }
                }
            }
        });

        // Топ расходов по категориям
        const catMap = {};
        txs.filter(tx => tx.type === 'expense').forEach(tx => {
            catMap[tx.category_id] = (catMap[tx.category_id] || 0) + Number(tx.amount);
        });
        const catArr = Object.entries(catMap)
            .map(([id, sum]) => ({ cat: getCat(Number(id)), sum }))
            .sort((a, b) => b.sum - a.sum);

        const maxSum = catArr[0]?.sum || 1;
        const el = document.getElementById('rep-cats');
        if (!catArr.length) {
            el.innerHTML = '<div class="empty"><div class="empty-ico">📊</div><div class="empty-txt">Расходов нет</div></div>';
        } else {
            el.innerHTML = catArr.map(({ cat, sum }) => `
                <div class="cat-row">
                    <span style="font-size:24px">${cat.icon}</span>
                    <div class="cat-row-info">
                        <div class="cat-row-name">${cat.name}</div>
                        <div class="bar-bg">
                            <div class="bar-fill" style="width:${(sum/maxSum*100).toFixed(1)}%;background:var(--expense)"></div>
                        </div>
                    </div>
                    <div class="cat-row-sum" style="color:var(--expense)">−${fmt(sum)}</div>
                </div>
            `).join('');
        }

        // Графики по категориям
        buildCatChart(txs, 'income');
        buildCatChart(txs, 'expense');

    } catch(e) {
        console.error(e);
    }
}

// ════════════════════════════════════════
// CATEGORY CHARTS (доходы / расходы)
// ════════════════════════════════════════
const catCharts = { income: null, expense: null };
// активные категории для каждого графика (null = все)
const catActive = { income: new Set(), expense: new Set() };

function buildCatChart(txs, type) {
    // Собираем суммы по категориям
    const map = {};
    txs.filter(tx => tx.type === type).forEach(tx => {
        const id = tx.category_id;
        map[id] = (map[id] || 0) + Number(tx.amount);
    });

    const entries = Object.entries(map)
        .map(([id, sum]) => ({ id: Number(id), cat: getCat(Number(id)), sum }))
        .sort((a, b) => b.sum - a.sum);

    if (!entries.length) {
        document.getElementById(type === 'income' ? 'inc-cat-chips' : 'exp-cat-chips').innerHTML = '';
        document.getElementById(type === 'income' ? 'inc-cat-total' : 'exp-cat-total').textContent = fmt(0);
        if (catCharts[type]) { catCharts[type].destroy(); catCharts[type] = null; }
        return;
    }

    // Инициализируем активные категории (все включены по умолчанию)
    if (catActive[type].size === 0) {
        entries.forEach(e => catActive[type].add(e.id));
    }

    // Рендерим чипы-переключатели
    const chipsEl = document.getElementById(type === 'income' ? 'inc-cat-chips' : 'exp-cat-chips');
    const color   = type === 'income' ? 'var(--income)' : 'var(--expense)';
    chipsEl.innerHTML = entries.map(e => `
        <div class="chip ${catActive[type].has(e.id) ? 'active' : ''}"
             style="${catActive[type].has(e.id) ? 'background:' + color + ';border-color:' + color : ''}"
             data-type="${type}" data-id="${e.id}">
            ${e.cat.icon} ${e.cat.name}
        </div>
    `).join('');

    chipsEl.querySelectorAll('.chip').forEach(chip => {
        chip.addEventListener('click', () => {
            const id = Number(chip.dataset.id);
            const t  = chip.dataset.type;
            if (catActive[t].has(id)) {
                if (catActive[t].size === 1) return; // хотя бы одна должна быть
                catActive[t].delete(id);
            } else {
                catActive[t].add(id);
            }
            redrawCatChart(entries, t);
        });
    });

    redrawCatChart(entries, type);
}

function redrawCatChart(entries, type) {
    const color     = type === 'income' ? 'rgba(34,197,94,.8)' : 'rgba(239,68,68,.8)';
    const colorDim  = type === 'income' ? 'rgba(34,197,94,.2)' : 'rgba(239,68,68,.2)';
    const canvasId  = type === 'income' ? 'inc-cat-chart' : 'exp-cat-chart';
    const totalId   = type === 'income' ? 'inc-cat-total' : 'exp-cat-total';
    const chipsId   = type === 'income' ? 'inc-cat-chips' : 'exp-cat-chips';

    const active  = entries.filter(e => catActive[type].has(e.id));
    const total   = active.reduce((s, e) => s + e.sum, 0);

    document.getElementById(totalId).textContent = fmt(total);

    // Обновляем стиль чипов
    document.querySelectorAll(`#${chipsId} .chip`).forEach(chip => {
        const id  = Number(chip.dataset.id);
        const on  = catActive[type].has(id);
        const col = type === 'income' ? 'var(--income)' : 'var(--expense)';
        chip.style.background    = on ? col : '';
        chip.style.borderColor   = on ? col : '';
        chip.style.color         = on ? 'white' : '';
    });

    if (catCharts[type]) catCharts[type].destroy();
    const ctx = document.getElementById(canvasId).getContext('2d');
    catCharts[type] = new Chart(ctx, {
        type: 'bar',
        data: {
            labels: entries.map(e => e.cat.icon + ' ' + e.cat.name),
            datasets: [{
                data: entries.map(e => e.sum),
                backgroundColor: entries.map(e =>
                    catActive[type].has(e.id) ? color : colorDim
                ),
                borderRadius: 6,
            }]
        },
        options: {
            responsive: true,
            plugins: {
                legend: { display: false },
                tooltip: { callbacks: { label: c => ' ' + fmt(c.raw) } }
            },
            scales: {
                x: { ticks:{ color:'#8888AA', font:{ size:9 }, maxRotation:35 }, grid:{ color:'rgba(255,255,255,.05)' } },
                y: { ticks:{ color:'#8888AA', font:{ size:9 }, callback: v => fmt(v) }, grid:{ color:'rgba(255,255,255,.05)' } }
            }
        }
    });
}

// HISTORY
// ════════════════════════════════════════
document.getElementById('hist-type').addEventListener('change', loadHistory);
document.getElementById('hist-period').addEventListener('change', loadHistory);

async function loadHistory() {
    const type   = document.getElementById('hist-type').value;
    const period = document.getElementById('hist-period').value;
    const { from, to } = getPeriod(period);

    const filters = [`date=gte.${from}`, `date=lte.${to}`];
    if (type) filters.push(`type=eq.${type}`);

    try {
        const txs = await dbGet('transactions', { filters, order:'date.desc', limit:200 });
        const el = document.getElementById('hist-list');
        if (!txs.length) {
            el.innerHTML = '<div class="empty"><div class="empty-ico">📭</div><div class="empty-txt">Операций нет</div></div>';
            return;
        }
        el.innerHTML = txs.map(tx => txHTML(tx)).join('');
    } catch(e) {
        console.error(e);
        document.getElementById('hist-list').innerHTML = '<div class="loading">Ошибка загрузки</div>';
    }
}

// ════════════════════════════════════════
// SHARED — HTML для строки транзакции
// ════════════════════════════════════════
function txHTML(tx) {
    const cat  = getCat(tx.category_id);
    const sign = tx.type === 'expense' ? '−' : '+';
    const desc = tx.description ? ' · ' + tx.description : '';
    return `
        <div class="tx">
            <div class="tx-ico ${tx.type}">${cat.icon}</div>
            <div class="tx-info">
                <div class="tx-cat">${cat.name}</div>
                <div class="tx-date">${fmtDate(tx.date)}${desc}</div>
            </div>
            <div class="tx-sum ${tx.type}">${sign}${fmt(tx.amount)}</div>
        </div>
    `;
}
